# Body-specific template hints (for generators).
# Generators use these to insert boilerplate or reorder sections.
bodies:
  ietf_rfc:
    description: IETF Internet-Draft / RFC
    section_numbering: numeric  # 1, 1.1, 2, ...
    boilerplate: standardization/templates/ietf-boilerplate.md
    output_ext: .md
  iso:
    description: ISO/IEC (e.g. JTC 1/SC 42)
    section_numbering: clause  # 1, 2, 3, ...
    boilerplate: standardization/templates/iso-boilerplate.md
    output_ext: .md
  linux_foundation:
    description: Linux Foundation / AAIF
    section_numbering: numeric
    boilerplate: null
    output_ext: .md
