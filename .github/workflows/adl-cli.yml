# CI/CD Pipeline for @adl-spec/cli
#
# This workflow:
# - Builds and tests the CLI on PRs and pushes to main
# - Publishes to npm when the version in package.json changes on main
#
# Publishing uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret needed.
# Prerequisites:
# 1. Publish the first version manually: cd packages/adl-cli && npm publish --access public
# 2. Configure trusted publisher at https://www.npmjs.com/package/@adl-spec/cli/access
#    - Provider: GitHub Actions
#    - Organization: Ironstead-Group
#    - Repository: agent-definition-language
#    - Workflow: adl-cli.yml

name: ADL CLI

on:
  push:
    branches: [main]
    paths:
      - 'packages/adl-cli/**'
      - '.github/workflows/adl-cli.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/adl-cli/**'
      - '.github/workflows/adl-cli.yml'

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/adl-cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/adl-cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Check if version changed
        id: version-check
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @adl-spec/cli version 2>/dev/null || echo "0.0.0")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
          if [ "$CURRENT" = "$PUBLISHED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $CURRENT already published, skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Publishing $CURRENT (npm has $PUBLISHED)."
          fi

      - name: Install dependencies
        if: steps.version-check.outputs.skip == 'false'
        run: bun install --frozen-lockfile

      - name: Build
        if: steps.version-check.outputs.skip == 'false'
        run: bun run build

      - name: Publish to npm
        if: steps.version-check.outputs.skip == 'false'
        run: npm publish --provenance --access public
