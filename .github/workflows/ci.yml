# CI/CD Pipeline for ADL Specification Site
#
# This workflow:
# - Validates builds on pull requests
# - Syncs spec content and builds the site
# - Vercel handles actual deployment via GitHub integration
#
# Branch strategy:
# - main: Production deployment (Vercel auto-deploys)
# - PRs: Preview deployments (Vercel auto-deploys)

name: CI

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'versions/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'site/**'
      - 'versions/**'
      - '.github/workflows/ci.yml'

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Sync spec content
        working-directory: site
        run: npm run sync-spec

      - name: Run prebuild (YAML to JSON)
        working-directory: site
        run: npm run prebuild

      - name: Build site
        working-directory: site
        run: npx docusaurus build

      - name: Validate llms.txt generation
        working-directory: site
        run: |
          echo "Checking llms.txt files..."
          test -f build/llms.txt || (echo "ERROR: llms.txt not generated" && exit 1)
          test -f build/llms-full.txt || (echo "ERROR: llms-full.txt not generated" && exit 1)

          # Ensure not the placeholder (real file has 100+ lines, placeholder has ~7)
          LINES=$(wc -l < build/llms.txt)
          echo "llms.txt: $LINES lines"
          if [ "$LINES" -lt 50 ]; then
            echo "ERROR: llms.txt appears to be placeholder (only $LINES lines)"
            exit 1
          fi

          # Check for expected content structure
          grep -q "## spec" build/llms.txt || (echo "ERROR: llms.txt missing spec section" && exit 1)

          echo "llms-full.txt: $(wc -l < build/llms-full.txt) lines"
          head -5 build/llms.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: github.event_name == 'pull_request'
        with:
          name: site-build
          path: site/build
          retention-days: 7

