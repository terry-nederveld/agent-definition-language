# Contributor License Agreement check
#
# Uses CLA Assistant to require contributors to sign the CLA before
# their pull request can be merged. Contributors sign by commenting
# "I have read the CLA Document and I hereby sign the CLA" on their PR.
#
# Signatures are stored in a branch (cla-signatures) in this repository.

name: CLA

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  cla-check:
    name: CLA Signature Check
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_target') ||
      (github.event_name == 'issue_comment' && github.event.comment.body == 'recheck')

    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-document: 'https://github.com/${{ github.repository }}/blob/main/CLA.md'
          path-to-signatures: 'signatures/cla.json'
          branch: 'cla-signatures'
          allowlist: terry-nederveld,dependabot[bot],github-actions[bot]
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can review this pull request, you need to sign our [Contributor License Agreement](https://github.com/${{ github.repository }}/blob/main/CLA.md).

            **To sign**, please comment on this PR with:

            > I have read the CLA Document and I hereby sign the CLA

            The CLA ensures that contributions include appropriate copyright and patent license grants. You only need to sign once — it applies to all future contributions.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          lock-pullrequest-aftermerge: false
