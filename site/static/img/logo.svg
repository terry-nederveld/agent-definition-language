<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#a5b4fc"/>
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="40" height="40" rx="10" fill="url(#logoGradient)"/>
  <!-- Neural network / agent connection pattern -->
  <g stroke="rgba(255,255,255,0.3)" stroke-width="1.5">
    <!-- Connection lines -->
    <line x1="12" y1="12" x2="20" y2="20"/>
    <line x1="28" y1="12" x2="20" y2="20"/>
    <line x1="20" y1="20" x2="12" y2="28"/>
    <line x1="20" y1="20" x2="28" y2="28"/>
    <line x1="20" y1="8" x2="20" y2="20"/>
    <line x1="20" y1="20" x2="20" y2="32"/>
  </g>
  <!-- Central node (the "Agent") -->
  <circle cx="20" cy="20" r="6" fill="white"/>
  <circle cx="20" cy="20" r="3" fill="url(#logoGradient)"/>
  <!-- Outer nodes -->
  <circle cx="12" cy="12" r="3" fill="rgba(255,255,255,0.9)"/>
  <circle cx="28" cy="12" r="3" fill="rgba(255,255,255,0.9)"/>
  <circle cx="12" cy="28" r="3" fill="rgba(255,255,255,0.9)"/>
  <circle cx="28" cy="28" r="3" fill="rgba(255,255,255,0.9)"/>
  <circle cx="20" cy="8" r="2.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="20" cy="32" r="2.5" fill="rgba(255,255,255,0.7)"/>
</svg>
