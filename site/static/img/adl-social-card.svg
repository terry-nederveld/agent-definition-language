<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e"/>
      <stop offset="50%" style="stop-color:#0369a1"/>
      <stop offset="100%" style="stop-color:#075985"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e"/>
      <stop offset="50%" style="stop-color:#0369a1"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#7dd3fc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="400" y1="0" x2="1200" y2="530"/>
    <line x1="800" y1="0" x2="1200" y2="260"/>
    <line x1="0" y1="100" x2="1200" y2="630"/>
    <line x1="0" y1="300" x2="900" y2="630"/>
    <line x1="0" y1="500" x2="400" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="800" y1="0" x2="0" y2="530"/>
    <line x1="400" y1="0" x2="0" y2="260"/>
    <line x1="1200" y1="100" x2="0" y2="630"/>
    <line x1="1200" y1="300" x2="300" y2="630"/>
    <line x1="1200" y1="500" x2="800" y2="630"/>
  </g>

  <!-- Decorative network nodes (right side, behind content) -->
  <g opacity="0.12">
    <!-- Connection lines -->
    <g stroke="white" stroke-width="1.5">
      <line x1="900" y1="120" x2="1020" y2="200"/>
      <line x1="1020" y1="200" x2="1100" y2="140"/>
      <line x1="1020" y1="200" x2="1060" y2="340"/>
      <line x1="1060" y1="340" x2="950" y2="400"/>
      <line x1="1060" y1="340" x2="1140" y2="420"/>
      <line x1="950" y1="400" x2="880" y2="500"/>
      <line x1="1140" y1="420" x2="1100" y2="520"/>
      <line x1="900" y1="120" x2="820" y2="240"/>
      <line x1="820" y1="240" x2="950" y2="400"/>
    </g>
    <!-- Nodes -->
    <circle cx="900" cy="120" r="8" fill="white"/>
    <circle cx="1020" cy="200" r="10" fill="white"/>
    <circle cx="1100" cy="140" r="6" fill="white"/>
    <circle cx="1060" cy="340" r="12" fill="white"/>
    <circle cx="950" cy="400" r="8" fill="white"/>
    <circle cx="1140" cy="420" r="7" fill="white"/>
    <circle cx="880" cy="500" r="6" fill="white"/>
    <circle cx="1100" cy="520" r="9" fill="white"/>
    <circle cx="820" cy="240" r="7" fill="white"/>
  </g>

  <!-- Logo mark (scaled from logo.svg) -->
  <g transform="translate(80, 180) scale(2.5)">
    <rect width="40" height="40" rx="10" fill="url(#logoGrad)"/>
    <g stroke="rgba(255,255,255,0.3)" stroke-width="1.5">
      <line x1="12" y1="12" x2="20" y2="20"/>
      <line x1="28" y1="12" x2="20" y2="20"/>
      <line x1="20" y1="20" x2="12" y2="28"/>
      <line x1="20" y1="20" x2="28" y2="28"/>
      <line x1="20" y1="8" x2="20" y2="20"/>
      <line x1="20" y1="20" x2="20" y2="32"/>
    </g>
    <circle cx="20" cy="20" r="6" fill="white"/>
    <circle cx="20" cy="20" r="3" fill="url(#logoGrad)"/>
    <circle cx="12" cy="12" r="3" fill="rgba(255,255,255,0.9)"/>
    <circle cx="28" cy="12" r="3" fill="rgba(255,255,255,0.9)"/>
    <circle cx="12" cy="28" r="3" fill="rgba(255,255,255,0.9)"/>
    <circle cx="28" cy="28" r="3" fill="rgba(255,255,255,0.9)"/>
    <circle cx="20" cy="8" r="2.5" fill="rgba(255,255,255,0.7)"/>
    <circle cx="20" cy="32" r="2.5" fill="rgba(255,255,255,0.7)"/>
  </g>

  <!-- Title text -->
  <text x="200" y="230" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="64" font-weight="700" fill="white" letter-spacing="-1">Agent Definition</text>
  <text x="200" y="300" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="64" font-weight="700" fill="white" letter-spacing="-1">Language</text>

  <!-- Accent line -->
  <rect x="200" y="325" width="120" height="4" rx="2" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="200" y="375" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" fill="rgba(255,255,255,0.75)" letter-spacing="0.5">The open standard for trusted AI agents</text>

  <!-- URL -->
  <text x="200" y="520" font-family="'SF Mono', 'Fira Code', monospace" font-size="20" fill="rgba(255,255,255,0.45)" letter-spacing="1">adl-spec.org</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)" opacity="0.6"/>
</svg>
